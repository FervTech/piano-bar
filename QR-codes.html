<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Piano Bar — Table QR Codes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Georgia', serif;
            background: #f5f0e8;
            color: #1a0f2e;
            padding: 32px 24px;
        }

        /* ── Screen controls (hidden on print) ── */
        .controls {
            max-width: 860px;
            margin: 0 auto 32px;
            background: #1a0f2e;
            color: #f5f0e8;
            border-radius: 16px;
            padding: 24px 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }
        .controls label { font-size: 13px; color: #a09abf; display: block; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
        .controls input, .controls select {
            background: #2e2050; border: 1px solid #3d2f6e;
            color: #f5f0e8; border-radius: 8px;
            padding: 8px 12px; font-size: 14px; outline: none;
        }
        .controls input[type="number"] { width: 80px; }
        .controls input[type="text"]   { width: 220px; }
        .btn {
            padding: 10px 22px; border-radius: 10px; border: none;
            font-size: 14px; font-weight: bold; cursor: pointer;
        }
        .btn-primary { background: #c9a84c; color: #1a0f2e; }
        .btn-print   { background: #7c3aed; color: #fff; }

        /* ── Grid of QR cards ── */
        .grid {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        /* ── Single QR card ── */
        .card {
            background: #fff;
            border: 2px solid #1a0f2e;
            border-radius: 16px;
            padding: 24px 20px 20px;
            text-align: center;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .card-header {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #7a6a90;
            margin-bottom: 4px;
        }
        .card-bar-name {
            font-size: 18px;
            font-weight: bold;
            color: #1a0f2e;
            margin-bottom: 2px;
            letter-spacing: 1px;
        }
        .card-piano {
            font-size: 22px;
            margin-bottom: 12px;
        }

        .qr-wrap {
            display: flex;
            justify-content: center;
            margin: 12px 0;
        }
        .qr-wrap canvas, .qr-wrap img {
            border-radius: 8px;
            border: 4px solid #f5f0e8;
        }

        .table-label {
            font-size: 28px;
            font-weight: bold;
            color: #1a0f2e;
            margin: 10px 0 2px;
            letter-spacing: 2px;
        }
        .table-sub {
            font-size: 11px;
            color: #7a6a90;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .divider {
            border: none;
            border-top: 1px dashed #c9a84c;
            margin: 14px 0;
        }

        .scan-cta {
            font-size: 13px;
            color: #3d2f6e;
            line-height: 1.5;
        }
        .scan-cta strong { color: #1a0f2e; }

        .url-text {
            font-size: 10px;
            color: #a09abf;
            margin-top: 8px;
            word-break: break-all;
            font-family: monospace;
        }

        /* ── Print styles ── */
        @media print {
            body { background: #fff; padding: 12px; }
            .controls { display: none !important; }
            .grid { gap: 16px; }
            .card { border-width: 1.5px; border-radius: 12px; padding: 18px 14px 14px; }
        }
    </style>
</head>
<body>

<!-- Screen controls -->
<div class="controls" id="controls">
    <div>
        <label>Your app URL</label>
        <input type="text" id="appUrl" value="https://yourbar.app/order" placeholder="https://yourbar.app/order" />
    </div>
    <div>
        <label>Tables: from</label>
        <input type="number" id="tableFrom" value="1" min="1" max="99" />
    </div>
    <div>
        <label>To</label>
        <input type="number" id="tableTo" value="12" min="1" max="99" />
    </div>
    <div>
        <label>QR size (px)</label>
        <select id="qrSize">
            <option value="160">160px (compact)</option>
            <option value="200" selected>200px (standard)</option>
            <option value="240">240px (large)</option>
        </select>
    </div>
    <button class="btn btn-primary" onclick="generate()">Generate QR codes</button>
    <button class="btn btn-print" onclick="window.print()">🖨 Print all</button>
</div>

<div class="grid" id="grid"></div>

<script>
    function generate() {
        const url   = document.getElementById('appUrl').value.trim().replace(/\/$/, '');
        const from  = parseInt(document.getElementById('tableFrom').value, 10);
        const to    = parseInt(document.getElementById('tableTo').value, 10);
        const size  = parseInt(document.getElementById('qrSize').value, 10);
        const grid  = document.getElementById('grid');

        if (!url || from > to) {
            alert('Please check your URL and table range.');
            return;
        }

        grid.innerHTML = '';

        for (let t = from; t <= to; t++) {
            const tableUrl = `${url}?table=${t}`;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
        <div class="card-header">The Piano Bar</div>
        <div class="card-piano">🎹</div>
        <div class="qr-wrap" id="qr-${t}"></div>
        <div class="table-label">Table ${t}</div>
        <div class="table-sub">Scan to order</div>
        <hr class="divider" />
        <div class="scan-cta">
          Point your camera at the QR code<br>
          <strong>Browse · Order · Enjoy</strong>
        </div>
        <div class="url-text">${tableUrl}</div>
      `;
            grid.appendChild(card);

            new QRCode(document.getElementById(`qr-${t}`), {
                text:          tableUrl,
                width:         size,
                height:        size,
                colorDark:     '#1a0f2e',
                colorLight:    '#ffffff',
                correctLevel:  QRCode.CorrectLevel.H,
            });
        }
    }

    // Auto-generate on load with defaults
    window.addEventListener('load', generate);
</script>
</body>
</html>
